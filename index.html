<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>엑셀 손익 n배 변환기</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script>
    (function () {
      function loadFallback() {
        var s = document.createElement("script");
        s.src = "https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js";
        document.head.appendChild(s);
      }
      window.addEventListener("load", function () {
        if (!window.XLSX) loadFallback();
      });
    })();
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 920px;
      margin: 40px auto;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .desc {
      margin: 0 0 20px;
      line-height: 1.6;
      color: #4b5563;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
      font-size: 14px;
    }

    input[type="file"],
    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #2563eb;
      color: #fff;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 200px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      overflow: auto;
    }

    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { margin: 20px auto; padding: 16px; }
      .card { padding: 18px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>엑셀 손익 n배 변환기</h1>
      <p class="desc">
        원본 엑셀의 구조를 최대한 유지한 채,
        <strong>확정손익금</strong>, <strong>미실현손익</strong>, <strong>순이익</strong>
        항목의 <strong>오른쪽 값 셀만</strong> 지정한 배수로 변경합니다.
        <br />
        이 버전은 원본 파일을 그대로 다시 저장하는 방식이 아니라,
        <strong>새 워크북을 다시 생성</strong>해서 저장합니다.
      </p>

      <div class="badge-row">
        <span class="badge">새 파일로 재생성</span>
        <span class="badge">병합 셀 유지</span>
        <span class="badge">열 너비 유지</span>
        <span class="badge">스타일 최대한 유지</span>
      </div>

      <div class="grid">
        <div class="field">
          <label for="fileInput">엑셀 파일 업로드</label>
          <input id="fileInput" type="file" accept=".xlsx" />
        </div>

        <div class="field">
          <label for="multiplier">배수(n)</label>
          <input id="multiplier" type="number" step="any" value="2" placeholder="예: 2" />
        </div>
      </div>

      <div class="actions">
        <button id="runBtn" class="primary">변환 후 다운로드</button>
        <button id="resetBtn" class="secondary" type="button">초기화</button>
      </div>

      <div id="status" class="status">준비 완료</div>

      <div class="hint">
        처리 방식: 모든 시트를 복사해서 새 워크북으로 만들고,
        각 시트에서 <b>확정손익금 / 미실현손익 / 순이익</b> 라벨을 찾은 뒤
        바로 오른쪽 값 셀만 n배로 변경합니다.
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const multiplierInput = document.getElementById("multiplier");
    const runBtn = document.getElementById("runBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");

    const TARGET_LABELS = new Set(["확정손익금", "미실현손익", "순이익"]);

    function log(message, reset = false) {
      if (reset) statusEl.textContent = "";
      statusEl.textContent += (statusEl.textContent ? "\n" : "") + message;
      statusEl.scrollTop = statusEl.scrollHeight;
    }

    function cloneDeep(obj) {
      if (obj == null || typeof obj !== "object") return obj;
      if (typeof structuredClone === "function") return structuredClone(obj);
      return JSON.parse(JSON.stringify(obj));
    }

    function roundSmart(num) {
      return Math.round((num + Number.EPSILON) * 100000000) / 100000000;
    }

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function parseNumber(value) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }

      if (typeof value !== "string") {
        return null;
      }

      let s = value.trim();
      if (!s) return null;

      let sign = 1;

      if (s.startsWith("(") && s.endsWith(")")) {
        sign = -1;
        s = s.slice(1, -1);
      }

      s = s
        .replace(/,/g, "")
        .replace(/₩/g, "")
        .replace(/원/g, "")
        .replace(/\s+/g, "");

      const isPercent = s.endsWith("%");
      if (isPercent) s = s.slice(0, -1);

      const n = Number(s);
      if (!Number.isFinite(n)) return null;

      return sign * (isPercent ? n / 100 : n);
    }

    function getCellText(cell) {
      if (!cell) return "";

      if (typeof cell.w === "string" && cell.w.trim() !== "") {
        return cell.w.trim();
      }

      if (typeof cell.v === "string") {
        return cell.v.trim();
      }

      if (cell.v == null) return "";

      return String(cell.v).trim();
    }

    function getNumericCellValue(cell) {
      if (!cell) return null;

      if (typeof cell.v === "number" && Number.isFinite(cell.v)) {
        return cell.v;
      }

      if (typeof cell.v === "string") {
        const parsed = parseNumber(cell.v);
        if (parsed !== null) return parsed;
      }

      if (typeof cell.w === "string") {
        const parsed = parseNumber(cell.w);
        if (parsed !== null) return parsed;
      }

      return null;
    }

    function makeStaticNumberCell(srcCell, newValue) {
      const nextCell = cloneDeep(srcCell || {});
      nextCell.t = "n";
      nextCell.v = roundSmart(newValue);

      delete nextCell.f;
      delete nextCell.F;
      delete nextCell.D;
      delete nextCell.w;
      delete nextCell.h;
      delete nextCell.r;

      return nextCell;
    }

    function copySheetMeta(srcWs, outWs) {
      const metaKeys = [
        "!ref",
        "!cols",
        "!rows",
        "!merges",
        "!margins",
        "!freeze",
        "!autofilter",
        "!outline"
      ];

      for (const key of metaKeys) {
        if (srcWs[key] != null) {
          outWs[key] = cloneDeep(srcWs[key]);
        }
      }
    }

    function processWorksheet(srcWs, sheetName, multiplier) {
      const outWs = {};
      copySheetMeta(srcWs, outWs);

      if (!srcWs["!ref"]) {
        return { ws: outWs, found: 0, changed: 0 };
      }

      const range = XLSX.utils.decode_range(srcWs["!ref"]);
      const hits = [];
      let found = 0;
      let changed = 0;

      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const addr = XLSX.utils.encode_cell({ r, c });
          const srcCell = srcWs[addr];

          if (srcCell) {
            outWs[addr] = cloneDeep(srcCell);
          }

          const label = normalizeText(getCellText(srcCell));
          if (!TARGET_LABELS.has(label)) continue;

          found += 1;
          hits.push({
            label,
            row: r,
            valueCol: c + 1
          });
        }
      }

      for (const hit of hits) {
        const valueAddr = XLSX.utils.encode_cell({ r: hit.row, c: hit.valueCol });
        const srcValueCell = srcWs[valueAddr];
        const num = getNumericCellValue(srcValueCell);

        if (num === null) continue;

        outWs[valueAddr] = makeStaticNumberCell(srcValueCell, num * multiplier);
        changed += 1;
      }

      return { ws: outWs, found, changed };
    }

    function getOutputFileName(originalName, multiplier) {
      const dotIndex = originalName.lastIndexOf(".");
      const base = dotIndex >= 0 ? originalName.slice(0, dotIndex) : originalName;
      const safeMultiplier = String(multiplier).replace(/\./g, "_");
      return `${base}_손익${safeMultiplier}배.xlsx`;
    }

    async function processWorkbook(file, multiplier) {
      if (!window.XLSX) {
        throw new Error("XLSX 라이브러리가 로드되지 않았습니다.");
      }

      const arrayBuffer = await file.arrayBuffer();

      const srcWb = XLSX.read(arrayBuffer, {
        type: "array",
        cellStyles: true,
        cellFormulas: true,
        cellNF: true,
        cellText: true,
        raw: true
      });

      const outWb = XLSX.utils.book_new();

      let totalFound = 0;
      let totalChanged = 0;

      for (const sheetName of srcWb.SheetNames) {
        const srcWs = srcWb.Sheets[sheetName];
        const result = processWorksheet(srcWs, sheetName, multiplier);

        XLSX.utils.book_append_sheet(outWb, result.ws, sheetName);

        totalFound += result.found;
        totalChanged += result.changed;

        log(`[${sheetName}] 라벨 발견 ${result.found}개 / 값 변경 ${result.changed}개`);
      }

      log(`총 라벨 발견: ${totalFound}개`);
      log(`총 값 변경: ${totalChanged}개`);

      if (totalFound === 0) {
        throw new Error("확정손익금 / 미실현손익 / 순이익 라벨을 찾지 못했습니다.");
      }

      if (totalChanged === 0) {
        throw new Error("라벨은 찾았지만 오른쪽 값 셀을 숫자로 처리하지 못했습니다.");
      }

      return outWb;
    }

    function downloadWorkbook(workbook, fileName) {
      XLSX.writeFile(workbook, fileName, {
        bookType: "xlsx",
        cellStyles: true,
        compression: true
      });
    }

    resetBtn.addEventListener("click", () => {
      fileInput.value = "";
      multiplierInput.value = "2";
      log("초기화 완료", true);
    });

    runBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      const multiplier = Number(multiplierInput.value);

      log("작업 시작", true);

      if (!file) {
        log("엑셀 파일을 먼저 선택해 주세요.");
        return;
      }

      if (!Number.isFinite(multiplier)) {
        log("배수(n)는 숫자로 입력해 주세요.");
        return;
      }

      runBtn.disabled = true;

      try {
        log(`파일명: ${file.name}`);
        log(`배수: ${multiplier}`);

        const outWb = await processWorkbook(file, multiplier);
        const outputName = getOutputFileName(file.name, multiplier);

        downloadWorkbook(outWb, outputName);
        log(`다운로드 완료: ${outputName}`);
      } catch (error) {
        console.error(error);
        log(`오류: ${error.message}`);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
