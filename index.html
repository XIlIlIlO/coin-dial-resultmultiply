<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>엑셀 손익 n배 변환기</title>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    .desc {
      margin: 0 0 20px;
      line-height: 1.6;
      color: #4b5563;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 16px;
      margin-bottom: 16px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-weight: 700;
      font-size: 14px;
    }
    input[type="file"],
    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #2563eb;
      color: #fff;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 180px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
      overflow: auto;
    }
    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }
    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 13px;
      font-weight: 700;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { margin: 20px auto; padding: 16px; }
      .card { padding: 18px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>엑셀 손익 n배 변환기</h1>
      <p class="desc">
        이미 정리된 엑셀 형식을 그대로 유지하면서
        <strong>확정손익금</strong>, <strong>미실현손익</strong>, <strong>순이익</strong>
        항목의 값만 지정한 배수로 변경합니다.
        <br />
        로직1~로직4뿐 아니라 로직5, 로직6, 로직7 이상으로 늘어나도
        고정 열 위치에 의존하지 않고 전체 시트를 스캔해서 처리합니다.
      </p>

      <div class="badge-row">
        <span class="badge">형식 유지</span>
        <span class="badge">병합 셀 유지</span>
        <span class="badge">스타일 최대한 유지</span>
        <span class="badge">로직 개수 무관</span>
      </div>

      <div class="grid">
        <div class="field">
          <label for="fileInput">엑셀 파일 업로드</label>
          <input id="fileInput" type="file" accept=".xlsx" />
        </div>

        <div class="field">
          <label for="multiplier">배수(n)</label>
          <input id="multiplier" type="number" step="any" value="2" placeholder="예: 2" />
        </div>
      </div>

      <div class="actions">
        <button id="runBtn" class="primary">변환 후 다운로드</button>
        <button id="resetBtn" class="secondary" type="button">초기화</button>
      </div>

      <div id="status" class="status">준비 완료</div>

      <div class="hint">
        처리 방식:
        시트 전체에서 <b>확정손익금 / 미실현손익 / 순이익</b> 셀을 찾고,
        그 바로 오른쪽 숫자 셀만 n배로 바꿉니다.
        그래서 로직 블록 수가 늘어나도 그대로 동작합니다.
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const multiplierInput = document.getElementById("multiplier");
    const runBtn = document.getElementById("runBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");

    const TARGET_LABELS = new Set(["확정손익금", "미실현손익", "순이익"]);

    function log(message, reset = false) {
      if (reset) {
        statusEl.textContent = "";
      }
      statusEl.textContent += (statusEl.textContent ? "\n" : "") + message;
      statusEl.scrollTop = statusEl.scrollHeight;
    }

    function roundSmart(num) {
      return Math.round((num + Number.EPSILON) * 100000000) / 100000000;
    }

    function parseNumber(value) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }

      if (typeof value === "string") {
        const cleaned = value.replace(/,/g, "").trim();
        if (cleaned === "") return null;
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : null;
      }

      return null;
    }

    function getCellDisplayText(cell) {
      if (!cell) return "";

      if (typeof cell.text === "string" && cell.text.trim() !== "") {
        return cell.text.trim();
      }

      const value = cell.value;

      if (typeof value === "string") {
        return value.trim();
      }

      if (value && typeof value === "object" && typeof value.richText !== "undefined") {
        return String(cell.text || "").trim();
      }

      if (value == null) return "";

      return String(value).trim();
    }

    function multiplyTargetCell(cell, multiplier) {
      if (!cell) return false;

      const value = cell.value;

      if (typeof value === "number" && Number.isFinite(value)) {
        cell.value = roundSmart(value * multiplier);
        return true;
      }

      if (typeof value === "string") {
        const parsed = parseNumber(value);
        if (parsed !== null) {
          cell.value = roundSmart(parsed * multiplier);
          return true;
        }
        return false;
      }

      if (value && typeof value === "object") {
        if (typeof value.formula === "string") {
          const formula = value.formula;
          const resultNum = parseNumber(value.result);

          cell.value = {
            formula: `(${formula})*(${multiplier})`,
            result: resultNum !== null ? roundSmart(resultNum * multiplier) : undefined,
            shareType: value.shareType,
            ref: value.ref
          };
          return true;
        }

        if (typeof value.result !== "undefined") {
          const resultNum = parseNumber(value.result);
          if (resultNum !== null) {
            cell.value = roundSmart(resultNum * multiplier);
            return true;
          }
        }
      }

      return false;
    }

    function getOutputFileName(originalName, multiplier) {
      const dotIndex = originalName.lastIndexOf(".");
      const base = dotIndex >= 0 ? originalName.slice(0, dotIndex) : originalName;
      const ext = dotIndex >= 0 ? originalName.slice(dotIndex) : ".xlsx";
      const safeMultiplier = String(multiplier).replace(/\./g, "_");
      return `${base}_손익${safeMultiplier}배${ext}`;
    }

    async function processWorkbook(file, multiplier) {
      const workbook = new ExcelJS.Workbook();
      const buffer = await file.arrayBuffer();

      await workbook.xlsx.load(buffer);

      let totalFound = 0;
      let totalChanged = 0;

      workbook.worksheets.forEach((worksheet) => {
        let sheetFound = 0;
        let sheetChanged = 0;

        worksheet.eachRow({ includeEmpty: true }, (row) => {
          row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
            const label = getCellDisplayText(cell);

            if (!TARGET_LABELS.has(label)) return;

            sheetFound += 1;
            totalFound += 1;

            const valueCell = row.getCell(colNumber + 1);
            const changed = multiplyTargetCell(valueCell, multiplier);

            if (changed) {
              sheetChanged += 1;
              totalChanged += 1;
            }
          });
        });

        log(`[${worksheet.name}] 라벨 발견 ${sheetFound}개 / 값 변경 ${sheetChanged}개`);
      });

      log(`총 라벨 발견: ${totalFound}개`);
      log(`총 값 변경: ${totalChanged}개`);

      if (totalFound === 0) {
        throw new Error("확정손익금 / 미실현손익 / 순이익 라벨을 찾지 못했습니다.");
      }

      if (totalChanged === 0) {
        throw new Error("라벨은 찾았지만 오른쪽 값 셀을 숫자로 처리하지 못했습니다.");
      }

      return await workbook.xlsx.writeBuffer();
    }

    function downloadBuffer(buffer, fileName) {
      const blob = new Blob(
        [buffer],
        { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" }
      );

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    resetBtn.addEventListener("click", () => {
      fileInput.value = "";
      multiplierInput.value = "2";
      log("초기화 완료", true);
    });

    runBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      const multiplier = Number(multiplierInput.value);

      log("작업 시작", true);

      if (!file) {
        log("엑셀 파일을 먼저 선택해 주세요.");
        return;
      }

      if (!Number.isFinite(multiplier)) {
        log("배수(n)는 숫자로 입력해 주세요.");
        return;
      }

      runBtn.disabled = true;

      try {
        log(`파일명: ${file.name}`);
        log(`배수: ${multiplier}`);

        const outputBuffer = await processWorkbook(file, multiplier);
        const outputName = getOutputFileName(file.name, multiplier);

        downloadBuffer(outputBuffer, outputName);
        log(`다운로드 완료: ${outputName}`);
      } catch (error) {
        console.error(error);
        log(`오류: ${error.message}`);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
